---
layout: default
---
<link rel="stylesheet" href="{{ '/assets/css/frontpage.css' | relative_url }}">

<article class="blog-post-page">
  <div class="blog-post-inner">
    <header class="blog-post-header">
      <a href="{{ '/blog/' | relative_url }}" class="blog-back-link">← Back to Blogs</a>
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}
      <p class="blog-post-subtitle">{{ page.subtitle }}</p>
      {% endif %}
      <div class="blog-post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
      </div>
    </header>
    <div class="blog-post-content">
      {{ content }}
    </div>
  </div>
</article>

<script src="{{ '/assets/js/blog.js' | relative_url }}?v=20260711g"></script>
